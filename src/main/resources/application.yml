server:
  port: ${API_GATEWAY_PORT:8080}

spring:
  config:
    import: "optional:file:.env[.properties]"
  application:
    name: ApiGateway

  cloud:
    gateway:
      server:
        webflux:
          # Global CORS configuration
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOriginPatterns:
                  - "http://localhost:3000"
                  - "http://localhost:5173"
                  - "http://localhost:5174"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - PATCH
                  - OPTIONS
                allowedHeaders:
                  - "*"
                exposedHeaders:
                  - "Authorization"
                allowCredentials: true
                maxAge: 3600

          routes:
            # ─── UserService (port 8081) ────────────────────────────────────────
            - id: user-auth
              uri: http://localhost:8081
              predicates:
                - Path=/api/auth/**

            - id: user-presence-ws
              uri: ws://localhost:8081
              predicates:
                - Path=/api/presence/ws

            # ─── RoomService (port 8082) ────────────────────────────────────────
            - id: room-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/rooms/**, /api/directions/**

            # ─── ContentService (port 8083) ─────────────────────────────────────
            - id: content-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/articles/**, /api/posts/**, /api/comments/**, /api/wiki/**, /api/tags/**

            # ─── InteractionService (port 8084) ─────────────────────────────────
            - id: interaction-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/interactions/**

# JWT configuration (shared secret with UserService)
jwt:
  secret: ${JWT_SECRET}

# Logging
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.example.apigateway: DEBUG